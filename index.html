<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班級重要行程公告欄</title>
    <style>
        /* 全域樣式設定 */
        :root {
            --primary-color: #6c8cbf; /* 溫和的粉藍色 */
            --accent-color: #f7a8b0;  /* 溫和的粉紅色 */
            --tag-holiday: #fbc2c4;   /* 放假標籤 */
            --tag-exam: #ffe599;      /* 考試標籤 */
            --tag-activity: #c9daf8;  /* 活動標籤 */
            --text-color: #4a4a4a;
            --bg-color: #f8f9fa;
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 頁首設計 */
        header {
            text-align: center;
            padding: 30px 0 20px 0;
        }

        header h1 {
            color: var(--primary-color);
            margin-bottom: 8px;
            font-size: 24px;
        }

        header p {
            color: #7a7a7a;
            font-size: 14px;
            margin: 0;
        }

        /* 篩選按鈕區 */
        .filter-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .filter-btn {
            border: none;
            background-color: #ffffff;
            color: var(--text-color);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: all 0.2s ease;
        }

        .filter-btn:hover, .filter-btn.active {
            background-color: var(--primary-color);
            color: white;
            transform: translateY(-1px);
        }

        /* 行程卡片列表 */
        .schedule-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .schedule-card {
            background-color: #ffffff;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border-left: 6px solid var(--primary-color);
            transition: transform 0.2s ease;
        }

        .schedule-card:hover {
            transform: translateY(-2px);
        }

        /* 日期區塊 */
        .event-date {
            min-width: 80px;
            text-align: center;
            margin-right: 20px;
            border-right: 1px solid #eeeeee;
            padding-right: 20px;
        }

        .event-date .month {
            font-size: 13px;
            color: #8a8a8a;
            display: block;
            text-transform: uppercase;
        }

        .event-date .day {
            font-size: 28px;
            font-weight: bold;
            color: var(--primary-color);
            line-height: 1.1;
        }

        /* 內容區塊 */
        .event-content {
            flex-grow: 1;
        }

        .event-title {
            font-size: 16px;
            font-weight: bold;
            margin: 0 0 5px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .event-desc {
            font-size: 14px;
            color: #666666;
            margin: 0;
        }

        /* 分類標籤樣式 */
        .tag {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: normal;
        }

        .tag-holiday { background-color: var(--tag-holiday); color: #c0392b; }
        .tag-exam { background-color: var(--tag-exam); color: #d68f00; }
        .tag-activity { background-color: var(--tag-activity); color: #2980b9; }

        /* RWD 響應式手機版優化 */
        @media (max-width: 576px) {
            .schedule-card {
                flex-direction: column;
                align-items: flex-start;
                border-left: 4px solid var(--primary-color);
            }

            .event-date {
                border-right: none;
                border-bottom: 1px dashed #eeeeee;
                padding-right: 0;
                padding-bottom: 10px;
                margin-right: 0;
                margin-bottom: 12px;
                width: 100%;
                text-align: left;
                display: flex;
                align-items: baseline;
                gap: 5px;
            }

            .event-date .day {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>重要行程公告</h1>
        <p>各位家長好，本頁面將即時更新班級與學校的重要活動日程，敬請留意。</p>
    </header>

    <div class="filter-container">
        <button class="filter-btn active" onclick="filterEvents('all')">顯示全部</button>
        <button class="filter-btn" onclick="filterEvents('holiday')">放假通知</button>
        <button class="filter-btn" onclick="filterEvents('exam')">考試日程</button>
        <button class="filter-btn" onclick="filterEvents('activity')">班級活動</button>
    </div>

    <div class="schedule-list">

        <div class="schedule-card" data-category="holiday">
            <div class="event-date">
                <span class="month">9 月</span>
                <span class="day">28</span>
            </div>
            <div class="event-content">
                <h3 class="event-title">
                    教師節放假一天
                    <span class="tag tag-holiday">放假通知</span>
                </h3>
                <p class="event-desc">適逢教師節，當日學校放假一天，請家長留意學童安全與作息規劃。</p>
            </div>
        </div>

        <div class="schedule-card" data-category="activity">
            <div class="event-date">
                <span class="month">10 月</span>
                <span class="day">15</span>
            </div>
            <div class="event-content">
                <h3 class="event-title">
                    秋季戶外教育
                    <span class="tag tag-activity">班級活動</span>
                </h3>
                <p class="event-desc">目的地為台北市立動物園，請孩子於當天穿著運動服、攜帶輕便雨具與水壺，並於早上 08:00 前至教室集合。</p>
            </div>
        </div>

        <div class="schedule-card" data-category="exam">
            <div class="event-date">
                <span class="month">11 月</span>
                <span class="day">05</span>
            </div>
            <div class="event-content">
                <h3 class="event-title">
                    期中定期評量
                    <span class="tag tag-exam">考試日程</span>
                </h3>
                <p class="event-desc">11/5(二)～11/6(三) 為期中考，考試科目包含國語、數學、自然、社會。請孩子提早複習準備。</p>
            </div>
        </div>

    </div>
</div>

<script>
    // 分類篩選功能
    function filterEvents(category) {
        // 更新按鈕樣式
        const buttons = document.querySelectorAll('.filter-btn');
        buttons.forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');

        // 篩選卡片
        const cards = document.querySelectorAll('.schedule-card');
        cards.forEach(card => {
            if (category === 'all' || card.getAttribute('data-category') === category) {
                card.style.display = 'flex';
            } else {
                card.style.display = 'none';
            }
        });
    }
</script>

</body>
</html>
